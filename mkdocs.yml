site_name: Developer Docs
site_url: https://norsk-gjeldsinformasjon.github.io/api-docs
repo_url: https://github.com/norsk-gjeldsinformasjon/api-docs
repo_name: api-docs

theme:
  name: material
  favicon: assets/favicon.ico
  logo: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra_css:
  - "stylesheets/extra.css"
  - https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css
# Extra javascript for add on functionality
extra_javascript:
  - "script/header_links.js"

plugins:
  - plantuml:
      puml_url: https://www.plantuml.com/plantuml/
      puml_keyword: plantuml
  - render_swagger
  - search
  - tags:
      tags_file: tags/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - def_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      permalink_title: Copy link to this section

nav:
  - Home: index.md
  - Get started: get-started/index.md
  - How-to:
    - How-to: howto/index.md
    - Select an integration: howto/select-integration.md
    - Authorize: howto/authorize.md
    - Look up debt with consent:
      - Look up debt with consent: howto/lookup-debt-with-consent.md
      - Get notified about changes to consents: howto/consent-notifications.md
    - Look up debt without consent: howto/lookup-debt-without-consent.md
    - Receive quarterly debt reports: howto/quarterly-debt-reports.md
    - Environments & endpoints: howto/environments.md
    - Deliver debt data:
      - Onboarding & scenarios: howto/deliver-debt-data/Onboarding_&_Scenarios.md
      - Testing & go-live: howto/deliver-debt-data/Testing_&_go-live.md
  - Reference:
    - Reference: reference/index.md
    - Consent reference: reference/consent.md
    - OpenAPI: reference/openapi.md
    - Deliver debt data API: reference/deliver-debt-data.md
    - Security requirements: reference/security-requirements.md
  - Explanations:
    - Explanations: explanation/index.md
    - Consent: explanation/consent.md
    - Consuming event feeds: explanation/consume-events-feed.md
  - Contribute: contributing.md
  - Tags: tags/index.md
