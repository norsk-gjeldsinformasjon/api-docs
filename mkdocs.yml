site_name: Developer Docs
site_url: https://norsk-gjeldsinformasjon.github.io/api-docs
repo_url: https://github.com/norsk-gjeldsinformasjon/api-docs
repo_name: api-docs

theme:
  name: material
  favicon: assets/favicon.ico
  logo: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.indexes
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra_css:
  - "stylesheets/extra.css"
  - https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css
# Extra javascript for add on functionality
extra_javascript:
  - "script/header_links.js"

plugins:
  - plantuml:
      puml_url: https://www.plantuml.com/plantuml/
      puml_keyword: plantuml
      # mkdocs_puml 2.x: auto dark/light themes and file caching
      theme:
        light: default/light
        dark: default/dark
      cache:
        backend: local
        local:
          path: ".cache/mkdocs_puml"
  - render_swagger
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - def_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      permalink_title: Copy link to this section

nav:
  - Home: index.md
  - Get started: get-started/index.md
  - How-to:
    - How-to: howto/index.md
    - Select an integration: howto/select-integration.md
    - Authorize: howto/authorize.md
    - Look up debt with consent:
      - Look up debt with consent: howto/lookup-debt-with-consent.md
      - Get notified about changes to consents: howto/consent-notifications.md
    - Look up debt without consent: howto/lookup-debt-without-consent.md
    - Manage consents externally: howto/external-consent-management.md
    - Receive quarterly debt reports: howto/quarterly-debt-reports.md
    - Deliver debt data:
      - Onboarding & scenarios: howto/deliver-debt-data/Onboarding_and_Scenarios.md
      - Testing & go-live: howto/deliver-debt-data/Testing_and_go-live.md
  - Reference:
    - Reference: reference/index.md
    - Consent API:
      - Overview: reference/consent/index.md
      - Scopes: reference/consent/scopes.md
      - Extended duration: reference/consent/extended-duration.md
      - Base URLs: reference/consent/base-urls.md
      - OpenID configuration: reference/consent/openid-configuration.md
      - Auth endpoint: reference/consent/auth-endpoint.md
      - Token endpoint: reference/consent/token-endpoint.md
      - Collect debt info: reference/consent/collect-debt.md
      - Consent feed: reference/consent/consent-feed.md
      - OpenAPI: reference/openapi.md
    - Deliver debt data API:
      - Overview: reference/deliver-debt-data/index.md
      - getalldata: reference/deliver-debt-data/getalldata.md
      - getDataForSSN: reference/deliver-debt-data/getDataForSSN.md
      - pushUpdates: reference/deliver-debt-data/pushUpdates.md
      - Data validation: reference/deliver-debt-data/validation.md
    - Security requirements: reference/security-requirements.md
  - Explanations:
    - Explanations: explanation/index.md
    - Consent: explanation/consent.md
    - Consuming event feeds: explanation/consume-events-feed.md
  - Contribute: contributing.md
  - Tags: tags/index.md
